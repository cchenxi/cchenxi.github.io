baseURL = "https://cchenxi.github.io/"
languageCode = "zh-cn"
title = "陈曦的技术博客"
theme = "PaperMod"

paginate = 10
enableRobotsTXT = true

pygmentsUseClasses = true
pygmentsCodeFences = true

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[taxonomies]
  category = "categories"
  tag = "tags"

[Author]
  name = "陈曦"
  bio = "软件工程师"
  avatar = "/image/WechatIMG2.jpeg"

[params]
  author = "陈曦"
  description = "软件工程师 · 技术笔记"
  dateformat = "2006-01-02"

  # 首页展示
  [params.homeInfoParams]
    Title = "欢迎"
    Content = "记录技术思考与实践笔记"

  # 社交链接
  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/cchenxi"

  [[params.socialIcons]]
    name = "email"
    url = "mailto:chenxi.et@gmail.com"
